plugins {
    id 'java'
}

group = 'com.matiasSofka'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'com.intuit.karate:karate-junit5:1.4.1'
    testImplementation 'net.masterthought:cucumber-reporting:5.7.5'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()

    systemProperty 'karate.env', System.getProperty('karate.env', 'dev')

    outputs.upToDateWhen { false }
}

sourceSets {
    test {
        resources {
            srcDir 'src/test/java'
        }
    }
}

task aggregate {
    dependsOn test
    doLast {
        def reportDir = file("${buildDir}/karate-reports")
        def reportFile = new File(reportDir, 'karate-summary.html')
        if (reportFile.exists()) {
            println "Karate report: file://${reportFile.absolutePath}"
            new ProcessBuilder('xdg-open', reportFile.absolutePath)
                .inheritIO()
                .start()
        } else {
            println "No karate report found at: ${reportFile.absolutePath}"
        }
    }
}